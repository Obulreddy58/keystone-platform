# ESO ExternalSecret — pulls sensitive config from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "infra-self-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: SELF_SERVICE_JIRA_API_TOKEN
      remoteRef:
        key: infra/self-service
        property: jira_api_token
    - secretKey: SELF_SERVICE_JIRA_USER_EMAIL
      remoteRef:
        key: infra/self-service
        property: jira_user_email
    - secretKey: SELF_SERVICE_JIRA_WEBHOOK_SECRET
      remoteRef:
        key: infra/self-service
        property: jira_webhook_secret
    - secretKey: SELF_SERVICE_GITHUB_TOKEN
      remoteRef:
        key: infra/self-service
        property: github_token
