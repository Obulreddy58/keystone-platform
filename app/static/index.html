<!-- ALPINE.JS APPLICATION -->
<!-- ══════════════════════════════════════════════════════════════════════ -->
<script>
function app() {
  return {
    // -- Auth --
    token: localStorage.getItem('ks_token')||'',
    user: JSON.parse(localStorage.getItem('ks_user')||'null'),
    authEmail: '', authPass: '', authName: '', authTeam: '', authError: '',

    // -- Navigation --
    page: 'dashboard',
    navItems: [
      {page:'dashboard', icon:'\u{1F4CA}', label:'Dashboard'},
      {page:'catalog',   icon:'\u{1F4E6}', label:'Service Catalog'},
      {page:'requests',  icon:'\u{1F4CB}', label:'Requests'},
      {page:'teams',     icon:'\u{1F465}', label:'Team Accounts'},
      {page:'docs',      icon:'\u{1F4D6}', label:'Documentation'},
      {page:'admin',     icon:'\u{1F6E1}\uFE0F', label:'Admin Panel', adminOnly:true},
      {page:'profile',   icon:'\u{1F464}', label:'My Profile'},
    ],
    visibleNav() {
      return this.navItems.filter(function(item) {
        if (item.adminOnly && (!this.user || this.user.role !== 'admin')) return false;
        return true;
      }.bind(this));
    },

    // -- Data --
    stats: {},
    requests: [],
    accounts: [],
    formSelectedAccount: null,
    detail: null,

    // -- WebSocket / Live --
    ws: null,
    wsConnected: false,
    toasts: [],
    toastCounter: 0,

    // -- Request Filters --
    reqSearch: '', reqStatusFilter: '', reqTypeFilter: '', reqTeamFilter: '',

    // -- Catalog --
    catalogFilter: 'All',
    catalogCategories: ['All','Compute','Data','Networking','Onboarding','Operations'],

    // -- Documentation --
    docTab: 'services',
    docSearch: '',
    docOpen: {},

    // -- EKS Upgrade --
    upgradeClusters: [],
    selectedUpgradeCluster: null,
    upgradeStep: 1,
    upgradeForm: { upgrade_strategy: 'rolling', node_max_unavailable: 1, drain_timeout_seconds: 300, notification_slack_channel: '', notification_email: '' },
    upgradeError: '',
    upgradeSuccess: null,

    // -- Admin Panel --
    adminTab: 'overview',
    adminUsers: [],
    adminActivity: [],
    adminSystem: null,
    adminUserSearch: '',

    // -- User Profile --
    profileRequests: [],
    profileStats: null,

    // -- Form --
    selectedType: '',
    form: {},
    formError: '', formSuccess: null, submitting: false,
    formClusters: [],
    formSelectedCluster: null,

    // -- Service Catalog & Fields (auto-generated from SERVICE_REGISTRY) --
    catalog: Object.keys(SERVICE_REGISTRY).map(function(t) { var s = SERVICE_REGISTRY[t]; return {type:t, name:s.name, icon:s.icon, category:s.category, desc:s.description}; }),
    serviceFieldDefs: Object.fromEntries(Object.keys(SERVICE_REGISTRY).map(function(t) { return [t, SERVICE_REGISTRY[t].fields]; })),
    // -- Init --
    async init() {
      if (this.token) {
        await this.loadDashboard();
        this.connectWebSocket();
      }
    },

    // -- WebSocket --
    connectWebSocket() {
      if (this.ws) { try { this.ws.close(); } catch(e) {} }
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var email = this.user?.email || '';
      var url = proto + '//' + location.host + '/ws?email=' + encodeURIComponent(email);
      this.ws = new WebSocket(url);
      var self = this;
      this.ws.onopen = function() { self.wsConnected = true; };
      this.ws.onclose = function() {
        self.wsConnected = false;
        // Auto-reconnect after 3s
        setTimeout(function() { if (self.token) self.connectWebSocket(); }, 3000);
      };
      this.ws.onerror = function() { self.wsConnected = false; };
      this.ws.onmessage = function(evt) { self.handleWsMessage(evt); };
    },
    handleWsMessage(evt) {
      try {
        var data = JSON.parse(evt.data);
      } catch(e) { return; }

      if (data.type === 'request_created') {
        this.addToast('New Request', data.message, 'info', data.ticket_key);
        // Live-update dashboard if viewing it
        if (this.page === 'dashboard') this.loadDashboard();
        if (this.page === 'requests') this.loadRequests();
      }
      else if (data.type === 'status_changed') {
        var severity = data.new_status === 'deployed' ? 'success'
                     : data.new_status === 'failed' ? 'error' : 'info';
        this.addToast('Status Update', data.message, severity, data.ticket_key);
        // Live-update current views
        if (this.page === 'dashboard') this.loadDashboard();
        if (this.page === 'requests') this.loadRequests();
        // If viewing this specific request, refresh it
        if (this.page === 'detail' && this.detail && this.detail.jira_ticket_key === data.ticket_key) {
          this.viewRequest(data.ticket_key);
        }
      }
      else if (data.type === 'notification') {
        this.addToast(data.title, data.message, data.severity || 'info', data.ticket_key);
      }
    },

    // -- Toast Notifications --
    addToast(title, message, severity, ticket_key) {
      var id = ++this.toastCounter;
      this.toasts.push({ id: id, title: title, message: message, severity: severity || 'info', ticket_key: ticket_key || '', removing: false });
      var self = this;
      // Auto-dismiss after 6 seconds
      setTimeout(function() { self.removeToast(id); }, 6000);
    },
    removeToast(id) {
      var t = this.toasts.find(function(x) { return x.id === id; });
      if (t && !t.removing) {
        t.removing = true;
        var self = this;
        setTimeout(function() { self.toasts = self.toasts.filter(function(x) { return x.id !== id; }); }, 300);
      }
    },
    toastStyle(severity) {
      var m = {
        success: 'bg-green-50 border-green-200 text-green-800',
        error: 'bg-red-50 border-red-200 text-red-800',
        warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
        info: 'bg-blue-50 border-blue-200 text-blue-800'
      };
      return m[severity] || m.info;
    },
    toastIcon(severity) {
      return {success:'\u2705', error:'\u274C', warning:'\u26A0\uFE0F', info:'\u{1F514}'}[severity] || '\u{1F514}';
    },

    // -- Authenticated Fetch Helper --
    async authFetch(url, options) {
      options = options || {};
      if (!options.headers) options.headers = {};
      if (this.token) options.headers['Authorization'] = 'Bearer ' + this.token;
      var resp = await fetch(url, options);
      if (resp.status === 401) { this.logout(); }
      return resp;
    },

    // -- Auth Methods --
    async login() {
      this.authError = '';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email: this.authEmail, password: this.authPass})
        });
        if (!r.ok) { const e = await r.json(); this.authError = e.detail || 'Login failed'; return; }
        const d = await r.json();
        this.token = d.access_token; this.user = d.user;
        localStorage.setItem('ks_token', d.access_token);
        localStorage.setItem('ks_user', JSON.stringify(d.user));
        await this.loadDashboard();
        this.connectWebSocket();
      } catch(e) { this.authError = 'Connection error'; }
    },
    async register() {
      this.authError = '';
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email: this.authEmail, password: this.authPass, full_name: this.authName || this.authEmail.split('@')[0], team_name: this.authTeam || ''})
        });
        if (!r.ok) { const e = await r.json(); this.authError = e.detail || 'Registration failed'; return; }
        const d = await r.json();
        this.token = d.access_token; this.user = d.user;
        localStorage.setItem('ks_token', d.access_token);
        localStorage.setItem('ks_user', JSON.stringify(d.user));
        await this.loadDashboard();
        this.connectWebSocket();
      } catch(e) { this.authError = 'Connection error'; }
    },
    logout() {
      this.token = ''; this.user = null;
      localStorage.removeItem('ks_token');
      localStorage.removeItem('ks_user');
      if (this.ws) { try { this.ws.close(); } catch(e) {} this.ws = null; }
      this.wsConnected = false;
    },

    // -- Navigation --
    navigate(p) {
      this.page = p;
      if (p === 'dashboard') this.loadDashboard();
      if (p === 'requests') this.loadRequests();
      if (p === 'teams') this.loadAccounts();
      if (p === 'eks-upgrade') this.loadUpgradeClusters();
      if (p === 'admin') this.loadAdmin();
      if (p === 'profile') this.loadProfile();
    },

    // -- Admin Panel Methods --
    async loadAdmin() {
      this.adminTab = 'overview';
      try {
        var [sys, users, activity] = await Promise.all([
          this.authFetch('/api/admin/system').then(r => r.ok ? r.json() : null),
          this.authFetch('/api/admin/users').then(r => r.ok ? r.json() : []),
          this.authFetch('/api/admin/activity').then(r => r.ok ? r.json() : []),
        ]);
        this.adminSystem = sys;
        this.adminUsers = users;
        this.adminActivity = activity;
      } catch(e) { console.error('Failed to load admin data', e); }
    },
    filteredAdminUsers() {
      if (!this.adminUserSearch) return this.adminUsers;
      var q = this.adminUserSearch.toLowerCase();
      return this.adminUsers.filter(function(u) { return u.email.toLowerCase().includes(q) || (u.full_name||'').toLowerCase().includes(q); });
    },
    async toggleUserRole(u) {
      var newRole = u.role === 'admin' ? 'viewer' : 'admin';
      try {
        var r = await this.authFetch('/api/admin/users/'+u.id+'/role', {
          method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({role: newRole})
        });
        if (r.ok) { u.role = newRole; this.addToast('User Updated', u.email+' is now '+newRole, 'success'); }
        else { var e = await r.json(); this.addToast('Error', e.detail || 'Failed to update role', 'error'); }
      } catch(e) { this.addToast('Error', 'Connection error', 'error'); }
    },
    async toggleUserStatus(u) {
      var newStatus = !u.is_active;
      try {
        var r = await this.authFetch('/api/admin/users/'+u.id+'/status', {
          method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({is_active: newStatus})
        });
        if (r.ok) { u.is_active = newStatus; this.addToast('User Updated', u.email+' '+(newStatus?'enabled':'disabled'), 'success'); }
        else { var e = await r.json(); this.addToast('Error', e.detail || 'Failed to update status', 'error'); }
      } catch(e) { this.addToast('Error', 'Connection error', 'error'); }
    },

    // -- User Profile Methods --
    async loadProfile() {
      try {
        var email = this.user?.email || '';
        var r = await this.authFetch('/api/requests?search='+encodeURIComponent(email)+'&limit=50');
        this.profileRequests = r.ok ? await r.json() : [];
      } catch(e) { console.error('Failed to load profile', e); this.profileRequests = []; }
    },

    // -- EKS Upgrade Methods --
    async loadUpgradeClusters() {
      this.selectedUpgradeCluster = null;
      this.upgradeStep = 1;
      this.upgradeError = '';
      this.upgradeSuccess = null;
      this.upgradeForm = { upgrade_strategy: 'rolling', node_max_unavailable: 1, drain_timeout_seconds: 300, notification_slack_channel: '', notification_email: this.user?.email || '' };
      try {
        var r = await this.authFetch('/api/upgrades/clusters');
        this.upgradeClusters = await r.json();
      } catch(e) { console.error('Failed to load clusters', e); this.upgradeClusters = []; }
    },
    selectUpgradeCluster(c) {
      this.selectedUpgradeCluster = c;
    },
    upgradeAddonChanges() {
      var c = this.selectedUpgradeCluster;
      if (!c) return [];
      var curr = c.current_addons || {};
      var next = c.next_addons || {};
      var labels = {'vpc-cni':'VPC CNI','coredns':'CoreDNS','kube-proxy':'kube-proxy','karpenter':'Karpenter','cluster-autoscaler':'Cluster Autoscaler'};
      var result = [];
      for (var k in next) {
        result.push({ name: k, label: labels[k]||k, from: curr[k]||'—', to: next[k] });
      }
      return result;
    },
    async submitUpgrade() {
      this.upgradeError = ''; this.submitting = true;
      try {
        var body = {
          source_cluster_key: this.selectedUpgradeCluster.jira_ticket_key,
          target_version: this.selectedUpgradeCluster.next_version,
          upgrade_strategy: this.upgradeForm.upgrade_strategy,
          node_max_unavailable: this.upgradeForm.node_max_unavailable,
          drain_timeout_seconds: this.upgradeForm.drain_timeout_seconds,
          notification_slack_channel: this.upgradeForm.notification_slack_channel,
          notification_email: this.upgradeForm.notification_email
        };
        var r = await this.authFetch('/api/upgrades/initiate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (!r.ok) {
          var e = await r.json();
          this.upgradeError = typeof e.detail === 'string' ? e.detail : JSON.stringify(e.detail);
          return;
        }
        this.upgradeSuccess = await r.json();
      } catch(e) { this.upgradeError = 'Connection error'; }
      finally { this.submitting = false; }
    },

    // -- Data Loading --
    async loadDashboard() {
      try {
        const [s, a] = await Promise.all([
          this.authFetch('/api/stats').then(r => r.json()),
          this.authFetch('/api/accounts').then(r => r.json())
        ]);
        this.stats = s; this.accounts = a;
      } catch(e) { console.error('Failed to load dashboard', e); }
    },
    async loadRequests() {
      let url = '/api/requests?limit=100';
      if (this.reqStatusFilter) url += '&status=' + encodeURIComponent(this.reqStatusFilter);
      if (this.reqTypeFilter) url += '&request_type=' + encodeURIComponent(this.reqTypeFilter);
      if (this.reqTeamFilter) url += '&team=' + encodeURIComponent(this.reqTeamFilter);
      if (this.reqSearch) url += '&search=' + encodeURIComponent(this.reqSearch);
      try { this.requests = await this.authFetch(url).then(r => r.json()); } catch(e) { console.error(e); }
    },
    async loadAccounts() {
      try { this.accounts = await this.authFetch('/api/accounts').then(r => r.json()); } catch(e) { console.error(e); }
    },
    async viewRequest(key) {
      try {
        this.detail = await this.authFetch('/api/requests/' + encodeURIComponent(key)).then(r => r.json());
        this.page = 'detail';
      } catch(e) { console.error(e); }
    },

    // -- Catalog --
    filteredCatalog() {
      if (this.catalogFilter === 'All') return this.catalog;
      return this.catalog.filter(s => s.category === this.catalogFilter);
    },

    // -- Request Form --
    async openRequestForm(type) {
      if (type === 'eks-upgrade') { this.navigate('eks-upgrade'); return; }
      this.selectedType = type;
      this.formError = ''; this.formSuccess = null;
      this.formClusters = []; this.formSelectedCluster = null; this.formSelectedAccount = null;
      // Load accounts for the selector
      if (!this.accounts.length) await this.loadAccounts();
      this.form = {
        request_type: type,
        team_name: this.user?.team_name || '',
        github_group: '',
        github_repo: 'infra',
        account_id: '',
        environment: '',
        cost_center: '',
        requester_email: this.user?.email || ''
      };
      // Smart auto-fill: if user's team has exactly one active account, auto-select it
      var teamAccounts = this.accounts.filter(a => a.status === 'active' && (!this.user?.team_name || a.team_name === this.user.team_name));
      if (teamAccounts.length === 1) {
        this.selectAccount(teamAccounts[0].team_name);
      }
      var fields = this.serviceFieldDefs[type] || [];
      for (var i = 0; i < fields.length; i++) {
        var f = fields[i];
        if (f.type === 'checkbox') this.form[f.name] = true;
        else if (f.type === 'select' && f.options && f.options.length) this.form[f.name] = f.options[0];
        else if (f.type === 'number') this.form[f.name] = f.min || 1;
        else this.form[f.name] = '';
      }
      // Load deployed clusters for dependent services
      if (SERVICE_REGISTRY[type] && SERVICE_REGISTRY[type].clusterDependent) {
        this.loadFormClusters();
      }
      this.page = 'new-request';
    },
    async loadFormClusters() {
      try {
        var r = await this.authFetch('/api/upgrades/clusters');
        this.formClusters = r.ok ? await r.json() : [];
      } catch(e) { this.formClusters = []; }
    },
    selectAccount(teamName) {
      if (!teamName) { this.formSelectedAccount = null; return; }
      var a = this.accounts.find(function(x) { return x.team_name === teamName; });
      if (!a) return;
      this.formSelectedAccount = a;
      this.form.team_name = a.team_name || '';
      this.form.account_id = a.account_id || '';
      this.form.github_group = a.github_group || '';
      this.form.github_repo = a.github_repo || 'infra';
      this.form.environment = a.environment || '';
      this.form.cost_center = a.cost_center || '';
    },
    selectFormCluster(c) {
      this.formSelectedCluster = c;
      // Auto-fill common fields from the cluster
      this.form.team_name = c.team_name || '';
      this.form.github_group = c.github_group || '';
      this.form.github_repo = c.github_repo || 'infra';
      this.form.account_id = c.account_id || '';
      this.form.environment = c.environment || '';
      // Auto-fill service-specific fields
      if (this.selectedType === 'sre-onboarding') {
        this.form.cluster_name = c.cluster_name || '';
        this.form.cluster_endpoint = (c.deployment_outputs && c.deployment_outputs.cluster_endpoint) || '';
      }
      if (this.selectedType === 'argocd-onboarding') {
        this.form.source_cluster_key = c.jira_ticket_key || '';
        this.form.cluster_name = c.cluster_name || '';
      }
    },
    serviceFields() { return this.serviceFieldDefs[this.selectedType] || []; },
    selectedServiceName() {
      var s = this.catalog.find(function(s) { return s.type === this.selectedType; }.bind(this));
      return s ? s.name : this.selectedType;
    },
    async submitRequest() {
      this.formError = ''; this.submitting = true;
      try {
        var r = await this.authFetch('/api/requests', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(this.form)
        });
        if (!r.ok) {
          var e = await r.json();
          if (Array.isArray(e.detail)) {
            this.formError = e.detail.map(function(d) { return (d.loc ? d.loc.slice(-1)[0] : '') + ': ' + d.msg; }).join(', ');
          } else {
            this.formError = typeof e.detail === 'string' ? e.detail : JSON.stringify(e.detail);
          }
          return;
        }
        this.formSuccess = await r.json();
      } catch(e) { this.formError = 'Connection error'; }
      finally { this.submitting = false; }
    },

    // -- Helpers --

    // -- Documentation Methods --
    getServiceDoc(type) {
      if (typeof KEYSTONE_DOCS !== 'undefined' && KEYSTONE_DOCS.services[type]) {
        return KEYSTONE_DOCS.services[type];
      }
      return { comingSoon: true, updated: null };
    },
    filteredServiceDocs() {
      var q = this.docSearch.toLowerCase();
      return this.catalog.filter(function(s) {
        if (!q) return true;
        return s.name.toLowerCase().indexOf(q) >= 0 ||
               s.type.toLowerCase().indexOf(q) >= 0 ||
               s.desc.toLowerCase().indexOf(q) >= 0 ||
               s.category.toLowerCase().indexOf(q) >= 0;
      });
    },
    adminDocSections() {
      if (typeof KEYSTONE_DOCS !== 'undefined' && KEYSTONE_DOCS.admin) {
        var q = this.docSearch.toLowerCase();
        if (!q) return KEYSTONE_DOCS.admin.sections;
        return KEYSTONE_DOCS.admin.sections.filter(function(s) {
          return s.title.toLowerCase().indexOf(q) >= 0 ||
                 s.content.join(' ').toLowerCase().indexOf(q) >= 0;
        });
      }
      return [];
    },
    filteredTeamDocs() {
      if (typeof KEYSTONE_DOCS !== 'undefined' && KEYSTONE_DOCS.teams) {
        var q = this.docSearch.toLowerCase();
        if (!q) return KEYSTONE_DOCS.teams;
        return KEYSTONE_DOCS.teams.filter(function(t) {
          if (t.name.toLowerCase().indexOf(q) >= 0) return true;
          for (var i = 0; i < t.sections.length; i++) {
            if (t.sections[i].title.toLowerCase().indexOf(q) >= 0) return true;
            if (t.sections[i].content.join(' ').toLowerCase().indexOf(q) >= 0) return true;
          }
          return false;
        });
      }
      return [];
    },
    toggleDocSection(key) {
      this.docOpen[key] = !this.docOpen[key];
    },

    statusColor(s) {
      var m = {
        deployed:'bg-green-100 text-green-700',
        pending:'bg-yellow-100 text-yellow-700',
        provisioning:'bg-blue-100 text-blue-700',
        failed:'bg-red-100 text-red-700',
        plan_running:'bg-indigo-100 text-indigo-700',
        awaiting_approval:'bg-orange-100 text-orange-700',
        cancelled:'bg-gray-100 text-gray-500',
        destroyed:'bg-gray-100 text-gray-500'
      };
      return m[s] || 'bg-gray-100 text-gray-600';
    },
    envColor(e) {
      var m = {prod:'bg-red-100 text-red-700 font-medium',staging:'bg-yellow-100 text-yellow-700',dev:'bg-green-100 text-green-700'};
      return m[e] || 'bg-gray-100 text-gray-600';
    },
    catColor(c) {
      var m = {Compute:'bg-blue-100 text-blue-700',Data:'bg-cyan-100 text-cyan-700',Networking:'bg-emerald-100 text-emerald-700',Onboarding:'bg-purple-100 text-purple-700',Operations:'bg-amber-100 text-amber-700'};
      return m[c] || 'bg-gray-100 text-gray-600';
    },
    accountStatusColor(s) {
      var m = {active:'bg-green-100 text-green-700',pending_approval:'bg-yellow-100 text-yellow-700',provisioning:'bg-blue-100 text-blue-700',suspended:'bg-red-100 text-red-700'};
      return m[s] || 'bg-gray-100 text-gray-600';
    },
    getAccessGuide(d) {
      if (!d || d.status !== 'deployed') return [];
      var t = d.request_type, o = d.deployment_outputs || {}, r = d.request_data || {};
      var name = r.name || r.cluster_name || r.table_name || r.function_name || r.bucket_name || r.zone_name || 'my-resource';
      var region = r.aws_region || r.region || 'eu-central-1';
      var env = r.environment || 'dev';
      var acct = d.aws_account_id || r.aws_account_id || '123456789012';
      var endpoint = o.endpoint || o.cluster_endpoint || '';
      var entry = SERVICE_REGISTRY[t];
      if (entry && entry.accessGuide) {
        return entry.accessGuide(r, o, env, region, name, acct, endpoint);
      }
      return [{title:'Access Information', desc:'Refer to the deployment outputs above for endpoints and connection details. Use the AWS CLI or SDK with your team credentials to connect.', commands:[{label:'Verify AWS access', code:'aws sts get-caller-identity --profile keystone-'+env}]}];
    },
    eventDotColor(t) {
      var m = {created:'bg-blue-500',pr_created:'bg-purple-500',status_change:'bg-green-500',security_scan_passed:'bg-emerald-500',plan_complete:'bg-indigo-500',error:'bg-red-500'};
      return m[t] || 'bg-gray-400';
    },
    timeAgo(d) {
      if (!d) return '';
      var s = Math.floor((Date.now() - new Date(d)) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    },
  };
}
</script>
